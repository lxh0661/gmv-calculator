<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GMV 计算器</title>
    <script>
(function (root, factory) {
  if (typeof module === "object" && module.exports) {
    module.exports = factory();
  } else {
    root.GmvCalculator = factory();
  }
})(typeof globalThis !== "undefined" ? globalThis : this, function () {
  const PRODUCTS = [
    { id: "earTraining", name: "磨耳朵陪跑", price: 2580 },
    { id: "phonics", name: "自然拼读", price: 1998 },
    { id: "rocketCamp", name: "红火箭陪跑营", price: 2880 },
    { id: "narutoCourse", name: "鸣人专属课", price: 5400 },
    { id: "morningReading", name: "好好晨读", price: 299 },
    { id: "primaryCompanion", name: "小学陪跑伴学", price: 399 },
    { id: "middleCompanion", name: "初中陪跑伴学", price: 499 },
    { id: "hedgehogEnglish", name: "刺猬英语", price: 2.1 },
  ];

  function parseAmount(value) {
    if (value === null || value === undefined) return 0;
    const normalized = String(value).replace(/[¥,\s]/g, "");
    if (!normalized) return 0;
    const parsed = Number(normalized);
    return Number.isFinite(parsed) ? parsed : 0;
  }

  function parseQuantity(value) {
    if (value === null || value === undefined || value === "") {
      return { quantity: 0, isValid: true };
    }

    const parsed = Number(value);
    if (!Number.isFinite(parsed) || parsed < 0 || !Number.isInteger(parsed)) {
      return { quantity: 0, isValid: false };
    }

    return { quantity: parsed, isValid: true };
  }

  function roundMoney(value) {
    return Math.round((Number(value) + Number.EPSILON) * 100) / 100;
  }

  function formatCurrency(value) {
    return new Intl.NumberFormat("zh-CN", {
      style: "currency",
      currency: "CNY",
      currencyDisplay: "narrowSymbol",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    }).format(roundMoney(value));
  }

  function calculateGmvBreakdown({ totalGmv, quantities }) {
    const parsedTotal = roundMoney(parseAmount(totalGmv));
    const safeQuantities = quantities || {};
    const productRows = PRODUCTS.map((product) => {
      const parsedQuantity = parseQuantity(safeQuantities[product.id]);
      const quantity = parsedQuantity.quantity;
      const amount = roundMoney(quantity * product.price);

      return {
        ...product,
        quantity,
        amount,
        isQuantityValid: parsedQuantity.isValid,
      };
    });
    const invalidQuantityRows = productRows.filter((row) => !row.isQuantityValid);
    const knownAmount = roundMoney(
      productRows.reduce((sum, row) => sum + row.amount, 0),
    );
    const remaining = roundMoney(parsedTotal - knownAmount);
    const isBalanced = remaining >= 0;

    return {
      totalGmv: parsedTotal,
      productRows,
      knownAmount,
      booksAmount: isBalanced ? remaining : 0,
      overageAmount: isBalanced ? 0 : Math.abs(remaining),
      isBalanced,
      invalidQuantityRows,
      hasQuantityErrors: invalidQuantityRows.length > 0,
    };
  }

  return {
    PRODUCTS,
    calculateGmvBreakdown,
    formatCurrency,
    parseAmount,
  };
});

</script>

  <body>
    <main class="app">
      <header class="topbar">
        <div class="title">
          <h1>GMV 计算器</h1>
          <p>固定商品按单价乘数量，教辅书籍自动吃掉剩余 GMV。</p>
        </div>
        <div class="status-pill" aria-label="离线可用">
          <span class="status-dot" aria-hidden="true"></span>
          本地离线可用
        </div>
      </header>

      <section class="layout">
        <div class="panel input-panel">
          <div class="section-head">
            <h2>输入</h2>
            <div class="actions">
              <button class="ghost-button" type="button" id="resetButton">清空</button>
              <button class="primary-button" type="button" id="copyButton">复制结果</button>
            </div>
          </div>

          <div class="gmv-field">
            <label for="totalGmv">直播总 GMV</label>
            <div class="money-input-wrap">
              <span class="money-symbol" aria-hidden="true">¥</span>
              <input
                class="money-input"
                id="totalGmv"
                inputmode="decimal"
                autocomplete="off"
                placeholder="0"
              />
            </div>
          </div>

          <div class="product-grid" id="productGrid"></div>
        </div>

        <aside class="panel summary-panel" aria-live="polite">
          <div class="section-head">
            <h2>输出</h2>
            <span class="status-pill" id="selectedCount">已选 0 类</span>
          </div>

          <div class="summary-total">
            <span>直播总 GMV</span>
            <strong id="totalOutput">¥0.00</strong>
          </div>

          <div class="metric-grid">
            <div class="metric">
              <span>固定商品合计</span>
              <strong id="knownOutput">¥0.00</strong>
            </div>
            <div class="metric books">
              <span>教辅书籍</span>
              <strong id="booksOutput">¥0.00</strong>
            </div>
          </div>

          <div class="alert" id="overageAlert"></div>
          <div class="result-list" id="resultList"></div>
          <div class="copy-status" id="copyStatus"></div>
        </aside>
      </section>
    </main>

    <script>
      const {
        PRODUCTS,
        calculateGmvBreakdown,
        formatCurrency,
      } = window.GmvCalculator;
      const storageKey = "offline-gmv-calculator-state-v1";
      const totalInput = document.querySelector("#totalGmv");
      const productGrid = document.querySelector("#productGrid");
      const totalOutput = document.querySelector("#totalOutput");
      const knownOutput = document.querySelector("#knownOutput");
      const booksOutput = document.querySelector("#booksOutput");
      const selectedCount = document.querySelector("#selectedCount");
      const overageAlert = document.querySelector("#overageAlert");
      const resultList = document.querySelector("#resultList");
      const resetButton = document.querySelector("#resetButton");
      const copyButton = document.querySelector("#copyButton");
      const copyStatus = document.querySelector("#copyStatus");

      function loadState() {
        try {
          return JSON.parse(localStorage.getItem(storageKey)) || {};
        } catch (error) {
          return {};
        }
      }

      function saveState(state) {
        localStorage.setItem(storageKey, JSON.stringify(state));
      }

      function currentQuantities() {
        return Object.fromEntries(
          PRODUCTS.map((product) => {
            const card = productGrid.querySelector(`[data-product="${product.id}"]`);
            const checkbox = card.querySelector(".product-toggle");
            const quantityInput = card.querySelector(".quantity-input");
            return [product.id, checkbox.checked ? quantityInput.value : 0];
          }),
        );
      }

      function renderProducts(state) {
        productGrid.innerHTML = PRODUCTS.map((product) => {
          const savedQuantity = state.quantities?.[product.id] || "";
          const checked = Number(savedQuantity) > 0;

          return `
            <label class="product-card ${checked ? "active" : ""}" data-product="${product.id}">
              <input class="product-toggle" type="checkbox" ${checked ? "checked" : ""} />
              <span class="product-info">
                <span class="product-name">${product.name}</span>
                <span class="product-price">单价 ${formatCurrency(product.price)}</span>
              </span>
              <span class="quantity-stack">
                <span>数量</span>
                <input
                  class="quantity-input"
                  type="number"
                  inputmode="numeric"
                  min="0"
                  step="1"
                  value="${savedQuantity}"
                  ${checked ? "" : "disabled"}
                  aria-label="${product.name}数量"
                />
                <strong class="product-subtotal" data-subtotal="${product.id}">¥0.00</strong>
              </span>
            </label>
          `;
        }).join("");
      }

      function renderResult() {
        const quantities = currentQuantities();
        const result = calculateGmvBreakdown({
          totalGmv: totalInput.value,
          quantities,
        });
        const selectedRows = result.productRows.filter((row) => row.quantity > 0);

        totalOutput.textContent = formatCurrency(result.totalGmv);
        knownOutput.textContent = formatCurrency(result.knownAmount);
        booksOutput.textContent = formatCurrency(result.booksAmount);
        selectedCount.textContent = `已选 ${selectedRows.length} 类`;

        result.productRows.forEach((row) => {
          const card = productGrid.querySelector(`[data-product="${row.id}"]`);
          const subtotal = card.querySelector(".product-subtotal");
          card.classList.toggle("invalid", !row.isQuantityValid);
          subtotal.textContent = row.isQuantityValid ? formatCurrency(row.amount) : "数量异常";
        });

        const alerts = [];
        if (result.hasQuantityErrors) {
          const names = result.invalidQuantityRows.map((row) => row.name).join("、");
          alerts.push(`${names} 的数量必须是 0 或正整数。`);
        }
        if (!result.isBalanced) {
          alerts.push(`固定商品金额已超出总 GMV ${formatCurrency(result.overageAmount)}，请检查数量或总 GMV。`);
        }
        overageAlert.classList.toggle("show", alerts.length > 0);
        overageAlert.textContent = alerts.join(" ");

        const fixedRows = result.productRows.map((row) => `
          <div class="result-row">
            <span class="result-name">
              <strong>${row.name}</strong>
              <span>${row.isQuantityValid ? `${formatCurrency(row.price)} × ${row.quantity}` : "数量异常，未计入金额"}</span>
            </span>
            <span class="result-amount">${row.isQuantityValid ? formatCurrency(row.amount) : "检查数量"}</span>
          </div>
        `).join("");

        resultList.innerHTML = `
          ${fixedRows}
          <div class="result-row books-row">
            <span class="result-name">
              <strong>教辅书籍</strong>
              <span>总 GMV - 固定商品合计</span>
            </span>
            <span class="result-amount">${formatCurrency(result.booksAmount)}</span>
          </div>
        `;

        saveState({
          totalGmv: totalInput.value,
          quantities,
        });

        return result;
      }

      function wireEvents() {
        totalInput.addEventListener("input", renderResult);

        productGrid.addEventListener("change", (event) => {
          const card = event.target.closest(".product-card");
          if (!card) return;
          const checkbox = card.querySelector(".product-toggle");
          const quantityInput = card.querySelector(".quantity-input");

          if (event.target.classList.contains("product-toggle")) {
            quantityInput.disabled = !checkbox.checked;
            card.classList.toggle("active", checkbox.checked);
            if (checkbox.checked && !quantityInput.value) {
              quantityInput.value = "1";
              quantityInput.focus();
              quantityInput.select();
            }
            if (!checkbox.checked) quantityInput.value = "";
          }

          renderResult();
        });

        productGrid.addEventListener("input", (event) => {
          if (!event.target.classList.contains("quantity-input")) return;
          const card = event.target.closest(".product-card");
          const checkbox = card.querySelector(".product-toggle");
          checkbox.checked = true;
          card.classList.add("active");
          renderResult();
        });

        resetButton.addEventListener("click", () => {
          totalInput.value = "";
          productGrid.querySelectorAll(".product-card").forEach((card) => {
            card.classList.remove("active");
            card.querySelector(".product-toggle").checked = false;
            const quantityInput = card.querySelector(".quantity-input");
            quantityInput.value = "";
            quantityInput.disabled = true;
          });
          copyStatus.textContent = "";
          renderResult();
          totalInput.focus();
        });

        copyButton.addEventListener("click", async () => {
          const result = renderResult();
          const lines = [
            `直播总GMV：${formatCurrency(result.totalGmv)}`,
            `固定商品合计：${formatCurrency(result.knownAmount)}`,
            `教辅书籍：${formatCurrency(result.booksAmount)}`,
            ...result.productRows.map((row) =>
              row.isQuantityValid
                ? `${row.name}：${row.quantity}件，${formatCurrency(row.amount)}`
                : `${row.name}：数量异常，未计入金额`,
            ),
          ];

          if (result.hasQuantityErrors) {
            const names = result.invalidQuantityRows.map((row) => row.name).join("、");
            lines.push(`异常：${names} 的数量必须是 0 或正整数`);
          }

          if (!result.isBalanced) {
            lines.push(`异常：固定商品超出总GMV ${formatCurrency(result.overageAmount)}`);
          }

          try {
            await navigator.clipboard.writeText(lines.join("\n"));
            copyStatus.textContent = "结果已复制。";
          } catch (error) {
            const textArea = document.createElement("textarea");
            textArea.value = lines.join("\n");
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            textArea.remove();
            copyStatus.textContent = "结果已复制。";
          }
        });
      }

      const initialState = loadState();
      totalInput.value = initialState.totalGmv || "";
      renderProducts(initialState);
      wireEvents();
      renderResult();
    </script>
  </body>
</html>
